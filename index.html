<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="site__header">
            <img src="img/logo.svg" alt="Логотип теннисного клуба" class="site__logo">
            <nav>
                <span class="nav__phone">
                    <img src="img/phone.svg" alt="Телефон теннисного клуба" class="nav__phone-icon">
                    <a href="/" class="nav__phone-number">+7 968 576 1549</a>
                </span>
                <a href="/" class="nav__button">ЗАПИСАТЬСЯ</a>
                <div class="nav__menu">
                    <span class="nav__menu-line"></span>
                    <span class="nav__menu-line"></span>
                    <span class="nav__menu-line"></span>
                </div>
            </nav>
        </div>
    </header>

    <main>

        <section class="hero">
            <div class="hero__container">
                <div class="hero__text">
                    <h1 class="hero__title">ТЕННИСНЫЙ КЭМП В ГРУЗИИ</h1>
                    <p class="hero__p">для тех, кто хочет повысить навыки в теннисе<br> и отдыхать в окружении своего
                        уровня</p>
                </div>
                <div class="hero__timer">
                    <p class="hero__timer-text">Успей забронировать! До начала кэмпа:</p>
                    <div class="hero__timer-container">
                        <div class="hero__timer-item">
                            <span class="hero__timer-number" id="days">00</span>
                            <span class="hero__timer-label">Дней</span>
                        </div>
                        <div class="hero__timer-item">
                            <span class="hero__timer-number" id="hours">00</span>
                            <span class="hero__timer-label">Часов</span>
                        </div>
                        <div class="hero__timer-item">
                            <span class="hero__timer-number" id="minutes">00</span>
                            <span class="hero__timer-label">Минут</span>
                        </div>
                        <div class="hero__timer-item">
                            <span class="hero__timer-number" id="seconds">00</span>
                            <span class="hero__timer-label">Секунд</span>
                        </div>
                    </div>
                </div>
            <a href="/" class="hero__button">забронировать место</a>
        </section>

        <section class="prev">
            
        </section>


    </main>
    <script src="script.js"></script>
</body>

</html>
